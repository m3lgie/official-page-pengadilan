# ============================================================
#  Nginx Virtual Host — Website Pengadilan
#  Salin ke: infra/nginx/conf.d/pengadilan.conf
#  
#  Untuk mengaktifkan HTTPS: aktifkan blok SSL di bawah
#  dan letakkan file .crt + .key di infra/nginx/ssl/
# ============================================================

# Redirect HTTP → HTTPS (Aktifkan jika sudah ada SSL)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl;                             # Aktifkan untuk HTTPS
    server_name _;                                # Otomatis menangkap domain apapun

    # ─── SSL ─────────────────────────────────────
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── Static Uploads (Dilayani langsung Nginx, CEPAT) ──
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Keamanan: Larang eksekusi file apapun yang di-upload
        location ~* \.(php|sh|py|rb|exe|pl|cgi)$ {
            deny all;
        }
    }

    # ─── API Backend (Rate Limited) ───────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://api-server:9090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Frontend Astro SSR ───────────────────────────────
    location / {
        limit_req zone=web_limit burst=30 nodelay;
        proxy_pass         http://web-portal:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
