# ============================================================
#  THE SPEED STACK — DOCKER COMPOSE
#  Website Pengadilan (PT & PN) — Multi-Satuan Kerja Ready
#  
#  CARA INSTALL DI SATUAN KERJA BARU:
#  1. cp .env.example .env
#  2. Edit .env sesuai data pengadilan
#  3. docker compose up -d --build
# ============================================================

name: pengadilan-web

services:

  # ─────────────────────────────────────────────
  # DATABASE: PostgreSQL 15
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pengadilan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-pengadilan_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pengadilan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # CACHE: Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pengadilan_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # BACKEND: Bun + ElysiaJS API Server
  # ─────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: ./infra/docker/api-server.Dockerfile
    container_name: pengadilan_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-pengadilan_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_JWT_SECRET: ${PUBLIC_JWT_SECRET}
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGIN: ${SITE_URL:-http://localhost:4000}
    volumes:
      - uploads:/app/public/uploads    # Named volume — aman saat rebuild
      - backups:/app/backups           # Shared dengan pg-backup
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # FRONTEND: Astro SSR (Bun adapter)
  # ─────────────────────────────────────────────
  web-portal:
    build:
      context: .
      dockerfile: ./infra/docker/web-portal.Dockerfile
    container_name: pengadilan_web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api-server:9090  # Komunikasi internal antar container
      PUBLIC_SITE_URL: ${SITE_URL:-http://localhost}
    networks:
      - internal
    depends_on:
      api-server:
        condition: service_started

  # ─────────────────────────────────────────────
  # REVERSE PROXY: Nginx
  # Satu-satunya titik masuk dari Internet.
  # web-portal & api (jika butuh akses publik) 
  # tidak perlu expose port langsung.
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pengadilan_nginx
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS (aktif jika SSL dikonfigurasi)
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro   # Letakkan file .crt dan .key di sini
      - uploads:/var/www/uploads:ro            # Serve file statis langsung dari Nginx (efisien)
    networks:
      - internal
    depends_on:
      - web-portal
      - api-server

  # ─────────────────────────────────────────────
  # BACKUP: Penjadwalan Otomatis pg_dump
  # Setiap 02:00 AM — retensi 7 hari, 4 minggu, 6 bulan
  # ─────────────────────────────────────────────
  pg-backup:
    image: prodrigestivill/postgres-backup-local:15  # Disesuaikan dengan versi PostgreSQL 15
    container_name: pengadilan_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-pengadilan_db}
      SCHEDULE: "@daily"           # Otomatis tiap 02:00 AM server time
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - backups:/backups
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

# ─────────────────────────────────────────────
# NETWORKS
# Semua komunikasi antar service lewat bridge 
# internal — tidak terekspos ke publik.
# ─────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ─────────────────────────────────────────────
# VOLUMES (Named — Data Aman Saat Rebuild)
# ─────────────────────────────────────────────
volumes:
  pgdata:
    name: pengadilan_pgdata
  redisdata:
    name: pengadilan_redisdata
  uploads:
    name: pengadilan_uploads
  backups:
    name: pengadilan_backups
